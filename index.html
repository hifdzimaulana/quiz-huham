<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz UTS Hukum & HAM</title>
    <style>
        :root {
            --bg-primary: #f5f5f7;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f0f0f0;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --text-tertiary: #a1a1a6;
            --accent: #007aff;
            --accent-light: rgba(0, 122, 255, 0.1);
            --success: #34c759;
            --success-light: rgba(52, 199, 89, 0.15);
            --error: #ff3b30;
            --error-light: rgba(255, 59, 48, 0.15);
            --border: rgba(0, 0, 0, 0.1);
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 8px 32px rgba(0, 0, 0, 0.12);
            --radius: 18px;
            --radius-sm: 12px;
            --radius-xs: 8px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #000000;
                --bg-secondary: #1c1c1e;
                --bg-tertiary: #2c2c2e;
                --text-primary: #f5f5f7;
                --text-secondary: #98989d;
                --text-tertiary: #636366;
                --border: rgba(255, 255, 255, 0.1);
                --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
                --shadow-hover: 0 8px 32px rgba(0, 0, 0, 0.6);
                --accent-light: rgba(0, 122, 255, 0.2);
                --success-light: rgba(52, 199, 89, 0.2);
                --error-light: rgba(255, 59, 48, 0.2);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: var(--bg-primary);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-primary);
            line-height: 1.5;
            transition: background var(--transition), color var(--transition);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--bg-secondary);
            border-radius: 24px;
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: background var(--transition), box-shadow var(--transition);
        }

        .header {
            background: linear-gradient(135deg, rgba(0, 122, 255, 0.15) 0%, rgba(0, 122, 255, 0.05) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 32px 28px;
            border-bottom: 1px solid var(--border);
            transition: background var(--transition), border var(--transition);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
        }

        .header-text h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 6px;
            color: var(--text-primary);
        }

        .header-text p {
            font-size: 0.95rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .stats-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .stat-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: var(--bg-secondary);
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            transition: all var(--transition);
        }

        .stat-pill span {
            font-weight: 600;
            color: var(--accent);
        }

        .stat-pill.score {
            background: var(--accent);
            color: white;
            border: none;
        }

        .stat-pill.score span {
            color: white;
            font-size: 1rem;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            padding: 28px;
            gap: 24px;
        }

        .navigation-panel {
            background: var(--bg-tertiary);
            border-radius: var(--radius);
            padding: 20px;
            transition: background var(--transition);
        }

        .nav-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-tertiary);
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .nav-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-height: 180px;
            overflow-y: auto;
            padding: 4px;
        }

        .nav-grid::-webkit-scrollbar {
            width: 4px;
        }

        .nav-grid::-webkit-scrollbar-thumb {
            background: var(--text-tertiary);
            border-radius: 2px;
        }

        .nav-btn {
            min-width: 40px;
            height: 40px;
            border: none;
            background: var(--bg-secondary);
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.2);
            color: var(--accent);
        }

        .nav-btn.active {
            background: var(--accent);
            color: white;
            transform: scale(1.08);
            box-shadow: 0 4px 16px rgba(0, 122, 255, 0.4);
        }

        .nav-btn.answered-correct {
            background: var(--success-light);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .nav-btn.answered-wrong {
            background: var(--error-light);
            color: var(--error);
            border: 1px solid var(--error);
        }

        .nav-btn.answered-correct.active,
        .nav-btn.answered-wrong.active {
            background: var(--accent);
            color: white;
            border: none;
        }

        .question-area {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 28px;
            border: 1px solid var(--border);
            min-height: 380px;
            transition: all var(--transition);
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .question-number {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .progress {
            font-size: 0.85rem;
            color: var(--text-tertiary);
            background: var(--bg-tertiary);
            padding: 6px 14px;
            border-radius: 16px;
            font-weight: 500;
        }

        .question-text {
            font-size: 1.2rem;
            line-height: 1.7;
            color: var(--text-primary);
            margin-bottom: 28px;
            font-weight: 500;
            letter-spacing: -0.01em;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            display: flex;
            align-items: center;
            padding: 18px 20px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition);
            text-align: left;
            font-size: 1rem;
            color: var(--text-primary);
            position: relative;
            overflow: hidden;
        }

        .option-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--accent-light);
            opacity: 0;
            transition: opacity var(--transition);
        }

        .option-btn:hover:not(.revealed) {
            border-color: var(--accent);
            transform: translateX(4px);
            box-shadow: 0 4px 16px rgba(0, 122, 255, 0.15);
        }

        .option-btn:hover:not(.revealed)::before {
            opacity: 1;
        }

        .option-letter {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            font-weight: 600;
            margin-right: 14px;
            color: var(--text-secondary);
            flex-shrink: 0;
            transition: all var(--transition);
            position: relative;
            z-index: 1;
        }

        .option-btn.correct {
            background: var(--success-light);
            border-color: var(--success);
            animation: correctPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .option-btn.correct .option-letter {
            background: var(--success);
            color: white;
        }

        .option-btn.wrong {
            background: var(--error-light);
            border-color: var(--error);
            animation: wrongShake 0.4s ease;
        }

        .option-btn.wrong .option-letter {
            background: var(--error);
            color: white;
        }

        .option-btn.revealed {
            cursor: default;
        }

        @keyframes correctPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        .result-display {
            margin-top: 24px;
            padding: 20px;
            border-radius: var(--radius-sm);
            text-align: center;
            font-weight: 500;
            font-size: 1rem;
            display: none;
            animation: resultSlide 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .result-display.show {
            display: block;
        }

        .result-display.correct {
            background: var(--success-light);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .result-display.wrong {
            background: var(--error-light);
            color: var(--error);
            border: 1px solid var(--error);
        }

        @keyframes resultSlide {
            from { opacity: 0; transform: translateY(-10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .navigation-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            gap: 12px;
        }

        .nav-arrow {
            padding: 14px 24px;
            border: none;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-arrow:hover:not(:disabled) {
            background: var(--accent);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 122, 255, 0.3);
        }

        .nav-arrow:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .reset-btn {
            padding: 12px 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all var(--transition);
        }

        .reset-btn:hover {
            border-color: var(--error);
            color: var(--error);
            background: var(--error-light);
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
            }

            .header h1 {
                font-size: 1.4rem;
            }

            .stats-bar {
                justify-content: center;
            }

            .nav-grid {
                justify-content: center;
            }

            .nav-btn {
                min-width: 36px;
                height: 36px;
                font-size: 0.8rem;
            }

            .question-text {
                font-size: 1.05rem;
            }

            .option-btn {
                padding: 14px 16px;
            }

            .navigation-controls {
                flex-wrap: wrap;
            }

            .nav-arrow {
                flex: 1;
                justify-content: center;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-content">
                <div class="header-text">
                    <h1>Quiz UTS Hukum & HAM</h1>
                    <p>Uji pemahaman Anda tentang Hukum dan Hak Asasi Manusia</p>
                </div>
            </div>
            <div class="stats-bar">
                <div class="stat-pill">Total <span id="totalQuestions">133</span></div>
                <div class="stat-pill">Terjawab <span id="answeredCount">0</span></div>
                <div class="stat-pill">Benar <span id="correctCount">0</span></div>
                <div class="stat-pill score">Skor <span id="percentage">0%</span></div>
            </div>
        </div>

        <div class="main-content">
            <div class="navigation-panel">
                <div class="nav-title">Navigasi Soal</div>
                <div class="nav-grid" id="navGrid"></div>
            </div>

            <div class="question-area">
                <div class="question-header">
                    <div class="question-number" id="questionNumber">Soal #1</div>
                    <div class="progress" id="progress">1 / 133</div>
                </div>

                <div class="question-text" id="questionText"></div>

                <div class="options-container" id="optionsContainer"></div>

                <div class="result-display" id="resultDisplay"></div>

                <div class="navigation-controls">
                    <button class="nav-arrow" id="prevBtn" onclick="goToPrev()">
                        ← Sebelumnya
                    </button>
                    <button class="reset-btn" onclick="resetQuiz()">Reset</button>
                    <button class="nav-arrow" id="nextBtn" onclick="goToNext()">
                        Berikutnya →
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let quizData = null;

        async function loadQuizData() {
            const response = await fetch('quiz-hukum-ham.json');
            quizData = await response.json();
            init();
        }

        let currentQuestion = 0;
        let userAnswers = {};
        let revealed = {};

        function init() {
            createNavigation();
            loadQuestion(0);
            updateStats();
        }

        function createNavigation() {
            const navGrid = document.getElementById('navGrid');
            navGrid.innerHTML = '';

            quizData.questions.forEach((q, index) => {
                const btn = document.createElement('button');
                btn.className = 'nav-btn';
                btn.textContent = index + 1;
                btn.onclick = () => loadQuestion(index);
                btn.id = `nav-${index}`;
                navGrid.appendChild(btn);
            });
        }

        function loadQuestion(index) {
            currentQuestion = index;
            const question = quizData.questions[index];

            document.querySelectorAll('.nav-btn').forEach((btn, i) => {
                btn.classList.remove('active', 'answered-correct', 'answered-wrong');
                if (i === index) btn.classList.add('active');

                if (userAnswers[i] !== undefined && revealed[i]) {
                    const q = quizData.questions[i];
                    const letters = ['a', 'b', 'c', 'd'];
                    const isCorrect = letters[userAnswers[i]] === q.answer;
                    btn.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');
                }
            });

            document.getElementById('questionNumber').textContent = `Soal #${index + 1}`;
            document.getElementById('progress').textContent = `${index + 1} / ${quizData.questions.length}`;
            document.getElementById('questionText').textContent = question.text;

            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';

            const letters = ['a', 'b', 'c', 'd'];
            question.options.forEach((option, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span class="option-letter">${letters[i].toUpperCase()}</span> ${option}`;
                btn.onclick = () => selectOption(i);
                btn.id = `option-${i}`;

                if (revealed[index]) {
                    btn.classList.add('revealed');
                    if (letters[i] === question.answer) {
                        btn.classList.add('correct');
                    } else if (userAnswers[index] === i) {
                        btn.classList.add('wrong');
                    }
                }

                optionsContainer.appendChild(btn);
            });

            const resultDisplay = document.getElementById('resultDisplay');
            if (revealed[index]) {
                const isCorrect = letters[userAnswers[index]] === question.answer;
                resultDisplay.className = `result-display show ${isCorrect ? 'correct' : 'wrong'}`;
                resultDisplay.innerHTML = isCorrect 
                    ? '✓ Benar! Jawaban Anda tepat.' 
                    : `✗ Salah. Jawaban yang benar adalah <strong>${question.answer.toUpperCase()}</strong>`;
            } else {
                resultDisplay.className = 'result-display';
                resultDisplay.innerHTML = '';
            }

            document.getElementById('prevBtn').disabled = index === 0;
            document.getElementById('nextBtn').disabled = index === quizData.questions.length - 1;
        }

        function selectOption(optionIndex) {
            if (revealed[currentQuestion]) return;

            const question = quizData.questions[currentQuestion];
            const letters = ['a', 'b', 'c', 'd'];
            const selectedLetter = letters[optionIndex];
            const isCorrect = selectedLetter === question.answer;

            userAnswers[currentQuestion] = optionIndex;
            revealed[currentQuestion] = true;

            document.querySelectorAll('.option-btn').forEach((btn, i) => {
                btn.classList.add('revealed');
                if (letters[i] === question.answer) {
                    btn.classList.add('correct');
                } else if (i === optionIndex) {
                    btn.classList.add('wrong');
                }
            });

            const resultDisplay = document.getElementById('resultDisplay');
            resultDisplay.className = `result-display show ${isCorrect ? 'correct' : 'wrong'}`;
            resultDisplay.innerHTML = isCorrect 
                ? '✓ Benar! Jawaban Anda tepat.' 
                : `✗ Salah. Jawaban yang benar adalah <strong>${question.answer.toUpperCase()}</strong>`;

            const navBtn = document.getElementById(`nav-${currentQuestion}`);
            navBtn.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');
            
            if (navigator.vibrate) {
                navigator.vibrate(isCorrect ? [50] : [100, 50, 100]);
            }
            
            updateStats();
        }

        function goToPrev() {
            if (currentQuestion > 0) {
                loadQuestion(currentQuestion - 1);
            }
        }

        function goToNext() {
            if (currentQuestion < quizData.questions.length - 1) {
                loadQuestion(currentQuestion + 1);
            }
        }

        function resetQuiz() {
            if (confirm('Yakin ingin mereset semua jawaban?')) {
                userAnswers = {};
                revealed = {};
                currentQuestion = 0;
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.classList.remove('answered-correct', 'answered-wrong');
                });
                loadQuestion(0);
                updateStats();
            }
        }

        function updateStats() {
            const answered = Object.keys(userAnswers).length;
            let correct = 0;

            Object.keys(userAnswers).forEach(index => {
                const q = quizData.questions[index];
                const letters = ['a', 'b', 'c', 'd'];
                if (letters[userAnswers[index]] === q.answer) {
                    correct++;
                }
            });

            const percentage = answered > 0 ? Math.round((correct / answered) * 100) : 0;

            document.getElementById('answeredCount').textContent = answered;
            document.getElementById('correctCount').textContent = correct;
            document.getElementById('percentage').textContent = percentage + '%';
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') goToPrev();
            if (e.key === 'ArrowRight') goToNext();
            if (e.key >= '1' && e.key <= '4') {
                const optionIndex = parseInt(e.key) - 1;
                if (optionIndex < 4) selectOption(optionIndex);
            }
        });

        loadQuizData();
    </script>
</body>
</html>
